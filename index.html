<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mundial 2026</title>

<style>

body{
    margin:0;
    background:#020b23;
    color:white;
    font-family:Arial, sans-serif;
}

.container{
    max-width:1200px;
    margin:auto;
    min-height:100vh;

    border-left:3px solid #ff0033;
    border-right:3px solid #ff0033;

    padding:40px;
}

h1{
    text-align:center;
    color:#ff0033;
    margin-top:20px;
}

.hero img{
    width:100%;
    display:block;
    border:3px solid #ff0033;
}

.calendar-section{
    margin-top:40px;
    margin-bottom:200px;
    text-align:center;
}

.calendar-section h2{
    color:white;
    margin-bottom:20px;
}

.weekdays{
    display:grid;
    grid-template-columns:repeat(7,60px);
    justify-content:center;
    gap:10px;
    margin-bottom:15px;
    font-weight:bold;
}

.calendar{
    display:grid;
    grid-template-columns:repeat(7,60px);
    gap:10px;
    justify-content:center;
}

.day{
    width:60px;
    height:60px;

    display:flex;
    justify-content:center;
    align-items:center;

    border-radius:12px;
    font-weight:bold;

    transition:0.2s;
}

.white:hover,
.yellow:hover,
.red:hover{
    transform:scale(1.08);
    cursor:pointer;
}

.empty{
    background:#111111;
    color:white;
}

.white{
    background:white;
    color:black;
}

.yellow{
    background:#ffd700;
    color:black;
}

.red{
    background:#ff0033;
    color:white;
}

#matches{
    margin-top:40px;
    display:none;
    overflow-x:auto;
}

table{
    width:auto;
    margin:auto;
    border-collapse:collapse;
}

td{
    border:2px solid #ff0033;
    padding:20px;
}

td:first-child{
    width:50px;
    text-align:center;
}

.legend{
    width:85%;
    height:220px;

    margin:30px auto 0 auto;

    border:3px solid #ff0033;

    display:flex;
    align-items:center;
    justify-content:center;

    color:#ff0033;
    font-size:24px;
    font-weight:bold;
}

.legend img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.rating-icon{
    width:88px;
    height:88px;

    object-fit:contain;
    display:block;
    margin:auto;

    transform:scale(1.35);
}

  .match-img{
    display:block;
    width:500px;
    height:auto;
}

@media (max-width:768px){

    .container{
        padding:15px;
    }

    .legend{
        width:100%;
        height:auto;
    }

    .legend img{
        width:100%;
        height:auto;
        object-fit:contain;
    }

    .weekdays{
    grid-template-columns:repeat(7,40px);
    gap:5px;
}

.calendar{
    grid-template-columns:repeat(7,40px);
    gap:5px;
}

.day{
    width:40px;
    height:40px;
    font-size:14px;
}

    table{
        width:100%;
    }

    td:first-child{
        width:70px;
    }

    .rating-icon{
        width:60px;
        height:60px;
        transform:none;
    }

    .match-img{
        width:100%;
        max-width:100%;
    }

}
    
</style>
</head>

<body>

<div class="container">

<h1>MUNDIAL 2026</h1>

<div class="hero">
    <img src="hero.png" alt="Mundial 2026">
</div>

<div class="legend">
    <img src="leg.png" alt="Legenda">
</div>

<div class="calendar-section">

    <h2>Czerwiec 2026</h2>

    <div class="weekdays">
        <div>Pon</div>
        <div>Wt</div>
        <div>Śr</div>
        <div>Czw</div>
        <div>Pt</div>
        <div>Sob</div>
        <div>Nie</div>
    </div>

    <div class="calendar">

        <div class="day empty">1</div>
        <div class="day empty">2</div>
        <div class="day empty">3</div>
        <div class="day empty">4</div>
        <div class="day empty">5</div>
        <div class="day empty">6</div>
        <div class="day empty">7</div>

        <div class="day empty">8</div>
        <div class="day empty">9</div>
        <div class="day empty">10</div>

        <div class="day white">11</div>
        <div class="day white">12</div>
        <div class="day red">13</div>
        <div class="day yellow">14</div>

        <div class="day white">15</div>
        <div class="day yellow">16</div>
        <div class="day red">17</div>
        <div class="day white">18</div>
        <div class="day yellow">19</div>
        <div class="day yellow">20</div>
        <div class="day white">21</div>

        <div class="day red">22</div>
        <div class="day yellow">23</div>
        <div class="day red">24</div>
        <div class="day white">25</div>
        <div class="day red">26</div>
        <div class="day yellow">27</div>
        <div class="day empty">28</div>

        <div class="day empty">29</div>
        <div class="day empty">30</div>

    </div>

 <div id="matches"></div>
</div>

</div>
<script>

const days = document.querySelectorAll('.white, .yellow, .red');
const matches = document.getElementById('matches');

    const ratings = {

    "13_2":"hit",

    "14_2":"ok",

    "16_1":"ok",

    "17_2":"hit",

    "19_2":"ok",

    "20_1":"ok",
    "20_2":"ok",

    "22_1":"hit",

    "23_2":"ok",

    "24_2":"ok",
    "24_4":"hit",

    "26_1":"hit",
    "26_4":"ok",

    "27_1":"ok",
    "27_4":"ok"

};

function createTable(dayNumber, matchCount){

    let html = "<table>";

    for(let i=1; i<=matchCount; i++){

        html += `
        <tr>
            <td>
              <img src="${ratings[`${dayNumber}_${i}`] || 'yikes'}.png" class="rating-icon">  
            </td>
            <td>
                <img src="${dayNumber}_${i}.png" class="match-img">
            </td>
        </tr>
        `;
    }

    html += "</table>";

    matches.innerHTML = html;
    matches.style.display = "block";
}

days.forEach(day => {

    day.addEventListener('click', () => {

        document.querySelectorAll('.day').forEach(d => {
            d.style.outline = 'none';
        });

        day.style.outline = '3px solid white';

        const dayNumber = parseInt(day.textContent);

        if(dayNumber === 11 || dayNumber === 12){
            createTable(dayNumber, 2);
        }
        else if(dayNumber >= 13 && dayNumber <= 23){
            createTable(dayNumber, 4);
        }
        else{
            createTable(dayNumber, 6);
        }

    });

});

</script>
    
</body>
</html>
